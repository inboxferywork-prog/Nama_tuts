<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Ajaib 🎹</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root { --bg:#1a1a2e; --card:#16213e; --card2:#0f3460; }

  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    background:var(--bg);
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden; overflow-y:auto;
    padding:16px 0 32px;
  }

  /* Stars */
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star  { position:absolute; border-radius:50%; background:white; animation:twinkle 2s infinite alternate; }
  @keyframes twinkle {
    from { opacity:0.1; transform:scale(1); }
    to   { opacity:0.8; transform:scale(1.3); }
  }

  /* Container */
  .container {
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center;
    gap:16px; padding:0 12px; width:100%;
  }

  /* Title */
  .title {
    font-family:'Fredoka One',cursive;
    font-size:clamp(1.8rem,5vw,3rem); text-align:center;
    background:linear-gradient(135deg,#FF6B6B,#FECA57,#48DBFB,#FF9FF3);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 0 20px rgba(255,107,107,0.4));
    animation:titleFloat 3s ease-in-out infinite;
  }
  @keyframes titleFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* Status */
  .status-bubble {
    background:var(--card); border:3px solid #ffffff22; border-radius:20px;
    padding:12px 22px; text-align:center;
    font-size:clamp(0.85rem,2.4vw,1.15rem); color:#eee; font-weight:700;
    min-height:54px; display:flex; align-items:center; justify-content:center;
    gap:10px; width:100%; max-width:560px;
  }
  .status-bubble .emoji { font-size:1.6em; animation:bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-5px)} }

  /* Mic */
  .mic-btn {
    background:linear-gradient(135deg,#FF6B6B,#FF9F43);
    border:none; border-radius:50%; width:78px; height:78px;
    font-size:2rem; cursor:pointer;
    box-shadow:0 0 28px rgba(255,107,107,0.5),0 8px 18px rgba(0,0,0,0.4);
    display:flex; align-items:center; justify-content:center;
    animation:pulseBtn 2s ease-in-out infinite;
  }
  .mic-btn:hover { transform:scale(1.08); }
  .mic-btn.listening { background:linear-gradient(135deg,#FF2222,#FF6B6B); animation:listenPulse 0.8s ease-in-out infinite; }
  @keyframes pulseBtn  { 0%,100%{box-shadow:0 0 28px rgba(255,107,107,0.5),0 8px 18px rgba(0,0,0,0.4)} 50%{box-shadow:0 0 48px rgba(255,107,107,0.9),0 8px 24px rgba(0,0,0,0.4)} }
  @keyframes listenPulse { 0%,100%{transform:scale(1);box-shadow:0 0 36px rgba(255,30,30,0.8)} 50%{transform:scale(1.07);box-shadow:0 0 64px rgba(255,30,30,1)} }

  /* Level buttons */
  .level-btns {
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    width:100%; max-width:560px;
  }
  .level-btn {
    font-family:'Fredoka One',cursive;
    font-size:clamp(0.78rem,2.2vw,1rem);
    white-space:nowrap;
    padding:8px 12px; border:3px solid #ffffff22;
    border-radius:50px; background:var(--card2); color:#bbb;
    cursor:pointer; transition:all 0.22s ease;
    flex:1; min-width:0;
  }
  .level-btn:hover { transform:scale(1.05); border-color:#ffffff55; color:white; }
  .level-btn.active { color:white; border-color:transparent; }
  .level-btn[data-level="p1"].active { background:linear-gradient(135deg,#FF6B6B,#FF9F43); box-shadow:0 0 14px #FF9F4388; }
  .level-btn[data-level="p2"].active { background:linear-gradient(135deg,#48DBFB,#54A0FF); box-shadow:0 0 14px #48DBFB88; }
  .level-btn[data-level="kb"].active { background:linear-gradient(135deg,#FECA57,#FF9F43); box-shadow:0 0 14px #FECA5788; }
  .level-btn[data-level="pi"].active { background:linear-gradient(135deg,#A29BFE,#FF9FF3); box-shadow:0 0 14px #A29BFE88; }

  /* Piano card */
  .piano-card {
    background:var(--card); border:3px solid #ffffff15; border-radius:24px;
    padding:20px 14px 16px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
    width:100%; box-shadow:0 16px 48px rgba(0,0,0,0.5);
  }

  /* Viewport */
  .piano-viewport {
    width:100%; position:relative; overflow:hidden;
    display:flex; justify-content:center;
  }

  /* Stage: natural size, then CSS-scale — centered */
  .keys-stage { position:relative; transform-origin:top center; flex-shrink:0; }

  /* White keys */
  .wk {
    position:absolute; bottom:0;
    background:linear-gradient(180deg,#f8f8f8 0%,#dcdcdc 100%);
    border:1.5px solid #bbb; border-top:none;
    border-radius:0 0 5px 5px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding-bottom:4px; cursor:default;
    transition:background 0.22s, box-shadow 0.22s;
    overflow:hidden;
  }
  .wk.active {
    border-width:2px;
    box-shadow:0 0 16px currentColor, inset 0 0 10px rgba(255,255,255,0.55);
  }
  .c-label {
    font-family:'Fredoka One',cursive;
    font-size:8px; color:#aaa;
    text-align:center; line-height:1.15;
    pointer-events:none; user-select:none; white-space:pre-line;
  }
  .wk.active .c-label { color:white; }

  /* Black keys */
  .bk {
    position:absolute; top:0;
    background:linear-gradient(180deg,#2a2a2a 0%,#111 100%);
    border-radius:0 0 4px 4px; z-index:2; cursor:default;
    transition:background 0.22s, box-shadow 0.22s;
  }
  .bk.active { box-shadow:0 0 12px currentColor, inset 0 0 7px rgba(255,255,255,0.22); }

  /* Note display */
  .note-display {
    display:flex; flex-direction:column; align-items:center;
    gap:6px; min-height:88px; justify-content:center;
  }
  .note-name {
    font-family:'Fredoka One',cursive;
    font-size:clamp(2.8rem,9vw,4.5rem); letter-spacing:4px;
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    opacity:0; transform:scale(0.5) translateY(16px);
  }
  .note-name.show { opacity:1; transform:scale(1) translateY(0); }
  .note-sub { font-size:0.92rem; color:#aaa; font-weight:700; opacity:0; transition:opacity 0.22s ease 0.12s; }
  .note-sub.show { opacity:1; }

  /* Confetti */
  .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:100; }
  .cp { position:absolute; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="container">
  <div class="title">🎹 Piano Ajaib!</div>

  <div class="status-bubble" id="statusBubble">
    <span class="emoji">👋</span>
    <span>Tekan tombol 🎤 lalu mainkan satu tuts piano!</span>
  </div>

  <button class="mic-btn" id="micBtn" onclick="toggleListening()">🎤</button>

  <div class="level-btns">
    <button class="level-btn" data-level="p1" onclick="setLevel('p1')">Primary 1</button>
    <button class="level-btn" data-level="p2" onclick="setLevel('p2')">Primary 2</button>
    <button class="level-btn" data-level="kb" onclick="setLevel('kb')">Keyboard</button>
    <button class="level-btn active" data-level="pi" onclick="setLevel('pi')">Piano</button>
  </div>

  <div class="piano-card">
    <div class="piano-viewport" id="pianoViewport">
      <div class="keys-stage" id="keysStage"></div>
    </div>
    <div class="note-display">
      <div class="note-name" id="noteName">—</div>
      <div class="note-sub"  id="noteSub"></div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────────────

const SOL_NAMES = {
  'C':'Do','C#':'Do♯','D':'Re','D#':'Re♯','E':'Mi',
  'F':'Fa','F#':'Fa♯','G':'Sol','G#':'Sol♯',
  'A':'La','A#':'La♯','B':'Si'
};
const NOTE_COLORS = {
  'C':'#FF6B6B','C#':'#FF8070','D':'#FF9F43','D#':'#FFB347',
  'E':'#FECA57','F':'#48DBFB','F#':'#36C9E8','G':'#54A0FF',
  'G#':'#4B8FF0','A':'#A29BFE','A#':'#C39BD3','B':'#FF9FF3'
};

// MIDI ranges
// Real 88-key piano: A0=21 … C8=108
const LEVELS = {
  p1: { startMidi:60, endMidi:67  },  // C4–G4
  p2: { startMidi:47, endMidi:74  },  // B2–D5
  kb: { startMidi:36, endMidi:84  },  // C2–C6
  pi: { startMidi:21, endMidi:108 },  // A0–C8 (88 keys)
};

// Semitone positions in an octave
const BLACK_SEMIS = new Set([1,3,6,8,10]);

// Base key dimensions (unscaled)
const WK_W = 22, WK_GAP = 2, WK_H = 112;
const BK_W = 13, BK_H  = 70;

let currentLevel = 'pi';
let allKeyEls    = {};  // midi number → DOM element

// ──────────────────────────────────────────────────────
// MIDI HELPERS
// ──────────────────────────────────────────────────────

function midiToNote(midi) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return { note: names[midi % 12], octave: Math.floor(midi / 12) - 1 };
}
function isBlack(midi) { return BLACK_SEMIS.has(midi % 12); }
function freqToMidi(freq) { return Math.round(69 + 12 * Math.log2(freq / 440)); }

// ──────────────────────────────────────────────────────
// BUILD PIANO
// ──────────────────────────────────────────────────────

function buildPiano(level) {
  const stage    = document.getElementById('keysStage');
  const viewport = document.getElementById('pianoViewport');
  stage.innerHTML = '';
  allKeyEls = {};

  const { startMidi, endMidi } = LEVELS[level];

  // First pass: assign x-position to every white key
  const whiteX = {}; // midi → left px
  let x = 0;
  for (let m = startMidi; m <= endMidi; m++) {
    if (!isBlack(m)) {
      whiteX[m] = x;
      x += WK_W + WK_GAP;
    }
  }
  const totalW = x - WK_GAP; // remove trailing gap

  stage.style.width  = totalW + 'px';
  stage.style.height = WK_H   + 'px';

  // White keys
  for (let m = startMidi; m <= endMidi; m++) {
    if (isBlack(m)) continue;
    const { note, octave } = midiToNote(m);
    const el = document.createElement('div');
    el.className = 'wk';
    el.style.left   = whiteX[m] + 'px';
    el.style.width  = WK_W + 'px';
    el.style.height = WK_H + 'px';

    if (note === 'C') {
      const lbl = document.createElement('div');
      lbl.className = 'c-label';
      lbl.textContent = octave === 4 ? 'Middle\nDo' : 'Do' + octave;
      el.appendChild(lbl);
    }
    stage.appendChild(el);
    allKeyEls[m] = el;
  }

  // Black keys — centered between adjacent white keys
  for (let m = startMidi; m <= endMidi; m++) {
    if (!isBlack(m)) continue;

    const leftW  = whiteX[m - 1];
    const rightW = whiteX[m + 1];
    let bx;
    if (leftW !== undefined && rightW !== undefined) {
      bx = leftW + WK_W + WK_GAP / 2 - BK_W / 2;
    } else if (leftW !== undefined) {
      bx = leftW + WK_W - BK_W / 2;
    } else if (rightW !== undefined) {
      bx = rightW - BK_W / 2;
    } else continue;

    const el = document.createElement('div');
    el.className = 'bk';
    el.style.left   = bx   + 'px';
    el.style.width  = BK_W + 'px';
    el.style.height = BK_H + 'px';
    stage.appendChild(el);
    allKeyEls[m] = el;
  }

  scaleToFit();
}

function scaleToFit() {
  const stage    = document.getElementById('keysStage');
  const viewport = document.getElementById('pianoViewport');
  const vw       = viewport.clientWidth || viewport.offsetWidth || 300;
  const nw       = parseFloat(stage.style.width) || 1;
  const scale    = Math.min(1, vw / nw);
  stage.style.transform = `scale(${scale})`;
  // Set viewport height to match scaled piano height
  viewport.style.height = (WK_H * scale) + 'px';
  // If stage fits (no scale needed), center it via margin auto
  if (scale >= 1) {
    stage.style.margin = '0 auto';
  } else {
    stage.style.margin = '';
  }
}

// ──────────────────────────────────────────────────────
// LEVEL SWITCHING
// ──────────────────────────────────────────────────────

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.level === level)
  );
  buildPiano(level);
  if (lastMidi !== null) highlightKey(lastMidi);
}

// ──────────────────────────────────────────────────────
// STARS
// ──────────────────────────────────────────────────────

function buildStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 3 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s`;
    c.appendChild(s);
  }
}

// ──────────────────────────────────────────────────────
// AUDIO / PITCH DETECTION
// ──────────────────────────────────────────────────────

let audioCtx = null, analyser = null, mediaStream = null;
let listening = false, pitchTimer = null;
let lastMidi  = null, silenceFrames = 0;

const SILENCE_RMS    = 0.01;
const SILENCE_FRAMES = 20;

async function toggleListening() {
  listening ? stopListening() : await startListening();
}

async function startListening() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    audioCtx    = new (window.AudioContext || window.webkitAudioContext)();
    const src   = audioCtx.createMediaStreamSource(mediaStream);
    analyser    = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    src.connect(analyser);

    listening = true; silenceFrames = 0; lastMidi = null;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '🔴';
    setStatus('👂', 'Aku mendengarkan... Mainkan satu tuts piano!');
    pitchTimer = setInterval(detectPitch, 60);
  } catch(e) {
    setStatus('😅', 'Izinkan akses mikrofon dulu ya!');
  }
}

function stopListening() {
  listening = false;
  clearInterval(pitchTimer);
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx)    audioCtx.close();
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎤';
  setStatus('👋', 'Tekan tombol 🎤 lagi untuk mendengarkan!');
}

function detectPitch() {
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  const rms = Math.sqrt(buf.reduce((s,v) => s + v*v, 0) / buf.length);
  if (rms < SILENCE_RMS) {
    if (++silenceFrames > SILENCE_FRAMES && lastMidi !== null) {
      clearActive(); lastMidi = null;
    }
    return;
  }
  silenceFrames = 0;

  const freq = detectFrequency(buf, audioCtx.sampleRate);
  if (freq < 27 || freq > 4200) return;

  const midi = freqToMidi(freq);
  if (midi === lastMidi) return;
  lastMidi = midi;

  const { note, octave } = midiToNote(midi);
  showNote(note, octave, midi);
}

// Robust pitch detection: NSDF autocorrelation (McLeod Pitch Method simplified)
// Avoids sub-octave errors by finding first strong peak, not the global maximum
function detectFrequency(buf, sr) {
  const N = buf.length;
  const MAXLAG = Math.floor(sr / 27.5);   // lowest piano note A0
  const MINLAG = Math.floor(sr / 4200);   // highest useful frequency

  // Step 1: compute NSDF (Normalized Square Difference Function)
  // nsdf[lag] = 1 - sdf[lag] / acf[0]*2  (ranges -1..1, peaks near 1)
  const nsdf = new Float32Array(MAXLAG + 1);

  // Running sum for the autocorrelation normalization
  let acf0 = 0;
  for (let i = 0; i < N; i++) acf0 += buf[i] * buf[i];
  if (acf0 < 1e-6) return -1;

  for (let lag = MINLAG; lag <= MAXLAG; lag++) {
    let sdf = 0;
    const len = N - lag;
    for (let i = 0; i < len; i++) {
      const d = buf[i] - buf[i + lag];
      sdf += d * d;
    }
    // Compute sum of squares for normalization
    let norm = 0;
    for (let i = 0; i < len; i++) norm += buf[i]*buf[i] + buf[i+lag]*buf[i+lag];
    nsdf[lag] = norm < 1e-9 ? 0 : 1 - sdf / norm;
  }

  // Step 2: find the FIRST peak above threshold 0.8
  // (MPM: find first positive-to-negative zero crossing after first negative region,
  //  then pick highest peak in that first period)
  const THRESHOLD = 0.80;
  let peakLag  = -1;
  let peakVal  = THRESHOLD;

  // scan from MINLAG upward, look for first peak >= threshold
  let prevVal = nsdf[MINLAG];
  for (let lag = MINLAG + 1; lag <= MAXLAG; lag++) {
    const v = nsdf[lag];
    if (prevVal < v && v >= THRESHOLD) {
      // local max candidate — confirm it's a true peak
      if (lag + 1 <= MAXLAG && nsdf[lag + 1] <= v) {
        if (v > peakVal) {
          peakVal = v;
          peakLag = lag;
          break; // take FIRST strong peak to avoid sub-octave errors
        }
      }
    }
    prevVal = v;
  }

  if (peakLag < 1) return -1;

  // Parabolic interpolation for finer frequency estimate
  const y0 = nsdf[peakLag - 1] || nsdf[peakLag];
  const y1 = nsdf[peakLag];
  const y2 = (peakLag + 1 <= MAXLAG) ? nsdf[peakLag + 1] : y1;
  const denom = (2 * y1 - y0 - y2);
  const refinedLag = denom === 0 ? peakLag : peakLag + 0.5 * (y0 - y2) / denom;

  return sr / refinedLag;
}

// ──────────────────────────────────────────────────────
// SHOW / HIGHLIGHT
// ──────────────────────────────────────────────────────

function clearActive() {
  document.querySelectorAll('.wk.active').forEach(k => {
    k.classList.remove('active');
    k.style.background  = '';
    k.style.borderColor = '';
    k.style.boxShadow   = '';
    k.style.color       = '';
  });
  document.querySelectorAll('.bk.active').forEach(k => {
    k.classList.remove('active');
    k.style.background = '';
    k.style.boxShadow  = '';
    k.style.color      = '';
  });
}

function highlightKey(midi) {
  clearActive();
  const { note } = midiToNote(midi);
  const color = NOTE_COLORS[note] || '#fff';
  const blk   = isBlack(midi);

  let el = allKeyEls[midi];
  if (!el) {
    const { startMidi, endMidi } = LEVELS[currentLevel];
    const clamped = Math.max(startMidi, Math.min(endMidi, midi));
    el = allKeyEls[clamped];
  }
  if (!el) return;

  el.classList.add('active');
  el.style.setProperty('color', color); // for c-label text via inheritance trick
  if (blk) {
    el.style.background = `linear-gradient(180deg,${color} 0%,${color}99 100%)`;
    el.style.boxShadow  = `0 0 12px ${color},inset 0 0 7px rgba(255,255,255,0.2)`;
  } else {
    el.style.background  = `linear-gradient(180deg,${color}ff 0%,${color}bb 100%)`;
    el.style.borderColor = color;
    el.style.boxShadow   = `0 0 18px ${color},inset 0 0 12px rgba(255,255,255,0.45)`;
  }
}

function showNote(note, octave, midi) {
  const color   = NOTE_COLORS[note] || '#fff';
  const solName = SOL_NAMES[note];

  highlightKey(midi);

  const nameEl = document.getElementById('noteName');
  const subEl  = document.getElementById('noteSub');
  nameEl.classList.remove('show'); subEl.classList.remove('show');
  nameEl.style.color      = color;
  nameEl.style.textShadow = `0 0 26px ${color},0 0 52px ${color}55`;

  setTimeout(() => {
    nameEl.textContent = solName;
    subEl.textContent  = `Nada ${solName} · Oktaf ${octave}`;
    nameEl.classList.add('show');
    subEl.classList.add('show');
  }, 40);

  const msgs = [
    `🎉 Itu nada ${solName}! Bagus sekali!`,
    `⭐ ${solName}! Kamu hebat!`,
    `🌟 Nada ${solName}! Teruskan!`,
    `🎶 ${solName}! Pintar sekali!`,
  ];
  setStatus('🎵', msgs[Math.floor(Math.random() * msgs.length)]);
  launchConfetti(color);
}

// ──────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────

function setStatus(emoji, text) {
  document.getElementById('statusBubble').innerHTML =
    `<span class="emoji">${emoji}</span><span>${text}</span>`;
}

function launchConfetti(color) {
  const wrap = document.getElementById('confetti');
  const pal  = [color,'#FECA57','#48DBFB','#FF9FF3','#fff'];
  for (let i = 0; i < 20; i++) {
    const p   = document.createElement('div');
    p.className = 'cp';
    const c   = pal[Math.floor(Math.random() * pal.length)];
    const sz  = 6 + Math.random() * 7;
    p.style.cssText = `
      left:${15+Math.random()*70}%;top:-10px;background:${c};
      width:${sz}px;height:${sz}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation:fall ${0.9+Math.random()*1.2}s ${Math.random()*0.3}s linear forwards;
    `;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 2200);
  }
}

// ──────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────

buildStars();
buildPiano('pi');   // default: 88 keys

window.addEventListener('resize', () => {
  // slight delay so layout reflows first
  setTimeout(scaleToFit, 50);
});
</script>
</body>
</html>
