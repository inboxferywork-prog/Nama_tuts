<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Ajaib</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --bg:#1a1a2e;
    --card:#16213e;
    --card2:#0f3460;
    --text:#eef2ff;
    --muted:#b9c2df;
    --orange-shadow:rgba(255,159,67,0.95);
    --blue-shadow:rgba(72,219,251,0.95);
    --danger:#ff5f57;
  }

  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    background:var(--bg);
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    overflow-y:auto;
    padding:16px 0 32px;
  }

  .stars {
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }

  .star {
    position:absolute;
    border-radius:50%;
    background:white;
    animation:twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity:0.1; transform:scale(1); }
    to { opacity:0.8; transform:scale(1.3); }
  }

  .container {
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    padding:0 12px;
    width:100%;
    max-width:760px;
  }

  .title {
    font-family:'Fredoka One',cursive;
    font-size:clamp(1.8rem,5vw,3rem);
    text-align:center;
    background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 20px rgba(255,107,107,0.4));
    animation:titleFloat 3s ease-in-out infinite;
  }

  @keyframes titleFloat {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-5px); }
  }

  .status-bubble {
    background:var(--card);
    border:3px solid #ffffff22;
    border-radius:20px;
    padding:12px 22px;
    text-align:center;
    font-size:clamp(0.85rem,2.4vw,1.15rem);
    color:var(--text);
    font-weight:700;
    min-height:54px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    max-width:560px;
  }

  .status-bubble .emoji {
    font-size:1.5em;
    animation:bounce 0.6s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform:translateY(0); }
    to { transform:translateY(-5px); }
  }

  .mic-btn {
    background:linear-gradient(135deg,#ff6b6b,#ff9f43);
    border:none;
    border-radius:50%;
    width:78px;
    height:78px;
    font-size:2rem;
    cursor:pointer;
    box-shadow:0 0 28px rgba(255,107,107,0.5),0 8px 18px rgba(0,0,0,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:pulseBtn 2s ease-in-out infinite;
    transition:transform 0.15s;
    color:white;
  }

  .mic-btn:hover { transform:scale(1.08); }

  .mic-btn.listening {
    background:linear-gradient(135deg,#ff2222,#ff6b6b);
    animation:listenPulse 0.8s ease-in-out infinite;
  }

  @keyframes pulseBtn {
    0%,100% { box-shadow:0 0 28px rgba(255,107,107,0.5),0 8px 18px rgba(0,0,0,0.4); }
    50% { box-shadow:0 0 48px rgba(255,107,107,0.9),0 8px 24px rgba(0,0,0,0.4); }
  }

  @keyframes listenPulse {
    0%,100% { transform:scale(1); box-shadow:0 0 36px rgba(255,30,30,0.8); }
    50% { transform:scale(1.07); box-shadow:0 0 64px rgba(255,30,30,1); }
  }

  .level-btns {
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:nowrap;
    width:100%;
    max-width:560px;
  }

  .level-btn {
    font-family:'Fredoka One',cursive;
    font-size:clamp(0.8rem,2.2vw,1rem);
    white-space:nowrap;
    padding:10px 12px;
    border:3px solid #ffffff22;
    border-radius:50px;
    background:var(--card2);
    color:#c7d0ea;
    cursor:pointer;
    transition:all 0.22s ease;
    flex:1;
    min-width:0;
  }

  .level-btn:hover {
    transform:scale(1.05);
    border-color:#ffffff55;
    color:white;
  }

  .level-btn.active {
    color:white;
    border-color:transparent;
  }

  .level-btn[data-level="l1"].active {
    background:linear-gradient(135deg,#ff6b6b,#ff9f43);
    box-shadow:0 0 14px rgba(255,159,67,0.55);
  }

  .level-btn[data-level="l2"].active {
    background:linear-gradient(135deg,#48dbfb,#54a0ff);
    box-shadow:0 0 14px rgba(72,219,251,0.55);
  }

  .level-btn[data-level="l3"].active {
    background:linear-gradient(135deg,#feca57,#ff9f43);
    box-shadow:0 0 14px rgba(254,202,87,0.55);
  }

  .piano-card {
    background:var(--card);
    border:3px solid #ffffff15;
    border-radius:24px;
    padding:20px 14px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    width:100%;
    box-shadow:0 16px 48px rgba(0,0,0,0.5);
  }

  .piano-viewport {
    width:100%;
    position:relative;
    padding-bottom:62px;
  }

  .keys-stage {
    position:relative;
    transform-origin:top left;
    margin:0 auto;
  }

  .wk {
    position:absolute;
    bottom:0;
    background:linear-gradient(180deg,#f8f8f8 0%,#dcdcdc 100%);
    border:1.5px solid #bbb;
    border-top:none;
    border-radius:0 0 6px 6px;
    cursor:default;
    transition:background 0.22s, box-shadow 0.22s;
    overflow:visible;
  }

  .wk.active {
    border-width:2px;
    box-shadow:0 0 16px currentColor,inset 0 0 10px rgba(255,255,255,0.55);
  }

  .bk {
    position:absolute;
    top:0;
    background:linear-gradient(180deg,#2a2a2a 0%,#111 100%);
    border-radius:0 0 5px 5px;
    z-index:2;
    cursor:default;
    transition:background 0.22s, box-shadow 0.22s;
  }

  .bk.active {
    box-shadow:0 0 12px currentColor,inset 0 0 7px rgba(255,255,255,0.22);
  }

  .level-l1 .bk.group-two,
  .level-l2 .bk.group-two {
    box-shadow:0 0 18px var(--orange-shadow);
  }

  .level-l1 .bk.group-three,
  .level-l2 .bk.group-three {
    box-shadow:0 0 18px var(--blue-shadow);
  }

  .middle-c-marker {
    position:absolute;
    left:50%;
    bottom:-56px;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:1px;
    color:#ffe082;
    pointer-events:none;
    white-space:nowrap;
    z-index:5;
  }

  .middle-c-star {
    font-size:16px;
    animation:starPulse 1.5s ease-in-out infinite;
    line-height:1;
  }

  .middle-c-text {
    font-size:11px;
    font-weight:900;
    color:#ffd166;
    text-shadow:0 0 10px rgba(255,209,102,0.45);
    line-height:1.05;
    text-align:center;
  }

  .middle-c-octave {
    font-size:10px;
    font-weight:900;
    color:#ffd166;
    text-shadow:0 0 10px rgba(255,209,102,0.45);
    line-height:1;
  }

  @keyframes starPulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.28); }
  }

  .direction-indicator {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    display:none;
    flex-direction:column;
    align-items:center;
    gap:4px;
    color:var(--danger);
    font-weight:900;
    z-index:10;
    text-shadow:0 0 16px rgba(255,95,87,0.7);
    animation:indicatorBlink 0.8s ease-in-out infinite;
    pointer-events:none;
  }

  .direction-indicator.show { display:flex; }
  .direction-indicator.left { left:4px; }
  .direction-indicator.right { right:4px; }
  .direction-indicator .finger { font-size:2rem; line-height:1; }
  .direction-indicator .dir-text { font-size:0.78rem; }

  @keyframes indicatorBlink {
    0%,100% { opacity:0.35; transform:translateY(-50%) scale(0.96); }
    50% { opacity:1; transform:translateY(-50%) scale(1.08); }
  }

  .note-display {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    min-height:110px;
    justify-content:center;
  }

  .note-name {
    font-family:'Fredoka One',cursive;
    font-size:clamp(2.5rem,8vw,4.2rem);
    letter-spacing:1px;
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    opacity:0;
    transform:scale(0.5) translateY(16px);
    text-align:center;
  }

  .note-name.show {
    opacity:1;
    transform:scale(1) translateY(0);
  }

  .note-extra {
    font-family:'Fredoka One',cursive;
    font-size:clamp(1rem,3vw,1.4rem);
    opacity:0;
    transition:opacity 0.22s ease 0.08s;
    color:#ccc;
  }

  .note-extra.show { opacity:1; }

  .note-sub {
    font-size:0.92rem;
    color:#9eabcc;
    font-weight:700;
    opacity:0;
    transition:opacity 0.22s ease 0.16s;
  }

  .note-sub.show { opacity:1; }

  .confetti-wrap {
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:100;
  }

  .cp {
    position:absolute;
    border-radius:2px;
    animation:fall linear forwards;
  }

  @keyframes fall {
    0% { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="container">
  <div class="title">Piano Ajaib</div>

  <div class="status-bubble" id="statusBubble">
    <span class="emoji">&#128075;</span>
    <span>Tekan tombol mikrofon lalu mainkan satu tuts piano.</span>
  </div>

  <button class="mic-btn" id="micBtn" onclick="toggleListening()" aria-label="Aktifkan mikrofon">&#127908;</button>

  <div class="level-btns">
    <button class="level-btn active" data-level="l1" onclick="setLevel('l1')">Level 1</button>
    <button class="level-btn" data-level="l2" onclick="setLevel('l2')">Level 2</button>
    <button class="level-btn" data-level="l3" onclick="setLevel('l3')">Level 3</button>
  </div>

  <div class="piano-card">
    <div class="piano-viewport" id="pianoViewport">
      <div class="direction-indicator left" id="leftIndicator">
        <div class="finger">&#128072;</div>
        <div class="dir-text">Nada di kiri</div>
      </div>
      <div class="direction-indicator right" id="rightIndicator">
        <div class="finger">&#128073;</div>
        <div class="dir-text">Nada di kanan</div>
      </div>
      <div class="keys-stage" id="keysStage"></div>
    </div>
    <div class="note-display">
      <div class="note-name" id="noteName">-</div>
      <div class="note-extra" id="noteExtra"></div>
      <div class="note-sub" id="noteSub"></div>
    </div>
  </div>
</div>

<script>
const SOL_BASE = {
  'C':'Do','C#':'Do#','D':'Re','D#':'Re#','E':'Mi',
  'F':'Fa','F#':'Fa#','G':'Sol','G#':'Sol#',
  'A':'La','A#':'La#','B':'Si'
};

const LETTER_NAME = {
  'C':'C','C#':'C#','D':'D','D#':'D#','E':'E',
  'F':'F','F#':'F#','G':'G','G#':'G#','A':'A','A#':'A#','B':'B'
};

const NOTE_COLORS = {
  'C':'#FF6B6B','C#':'#FF8070','D':'#FF9F43','D#':'#FFB347',
  'E':'#FECA57','F':'#48DBFB','F#':'#36C9E8','G':'#54A0FF',
  'G#':'#4B8FF0','A':'#A29BFE','A#':'#C39BD3','B':'#FF9FF3'
};

function getDisplayName(note) {
  switch (note) {
    case 'C#': return { main:'Do# (Sharp)', letter:'C#' };
    case 'D#': return { main:'Re# (Sharp)', letter:'D#' };
    case 'F#': return { main:'Fa# (Sharp)', letter:'F#' };
    case 'G#': return { main:'Sol# (Sharp)', letter:'G#' };
    case 'A#': return { main:'Si\u266D (Flat)', letter:'B\u266D' };
    default: return { main:SOL_BASE[note], letter:LETTER_NAME[note] };
  }
}

const LEVELS = {
  l1: { startMidi:60, endMidi:71 },
  l2: { startMidi:47, endMidi:76 },
  l3: { startMidi:36, endMidi:84 }
};

const BLACK_SEMIS = new Set([1,3,6,8,10]);
const BASE_WK_W = 22;
const BASE_WK_GAP = 2;
const BASE_WK_H = 112;
const BASE_BK_RATIO_W = 13 / 22;
const BASE_BK_RATIO_H = 70 / 112;
const SILENCE_FRAMES = 25;
const DB_THRESHOLD = 70;
const RMS_THRESHOLD = Math.pow(10, -(100 - DB_THRESHOLD) / 20);

let currentLevel = 'l1';
let allKeyEls = {};
let audioCtx = null;
let analyser = null;
let mediaStream = null;
let listening = false;
let pitchTimer = null;
let lastMidi = null;
let silenceFrames = 0;
let resizeTimer = null;

function midiToNote(midi) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return { note:names[midi % 12], octave:Math.floor(midi / 12) - 1 };
}

function isBlack(midi) {
  return BLACK_SEMIS.has(midi % 12);
}

function freqToMidi(freq) {
  return Math.round(69 + 12 * Math.log2(freq / 440));
}

function getBlackGroup(note) {
  if (note === 'C#' || note === 'D#') return 'group-two';
  if (note === 'F#' || note === 'G#' || note === 'A#') return 'group-three';
  return '';
}

function hideIndicators() {
  document.getElementById('leftIndicator').classList.remove('show');
  document.getElementById('rightIndicator').classList.remove('show');
}

function showIndicator(direction) {
  hideIndicators();
  if (direction === 'left') document.getElementById('leftIndicator').classList.add('show');
  if (direction === 'right') document.getElementById('rightIndicator').classList.add('show');
}

function buildPiano(level) {
  const stage = document.getElementById('keysStage');
  const viewport = document.getElementById('pianoViewport');
  stage.innerHTML = '';
  stage.className = 'keys-stage level-' + level;
  allKeyEls = {};
  hideIndicators();

  const range = LEVELS[level];
  let whiteCount = 0;
  for (let midi = range.startMidi; midi <= range.endMidi; midi++) {
    if (!isBlack(midi)) whiteCount++;
  }

  const vw = viewport.clientWidth || viewport.offsetWidth || 320;
  const gapRatio = BASE_WK_GAP / BASE_WK_W;
  const wkWidth = vw / (whiteCount + gapRatio * (whiteCount - 1));
  const wkGap = wkWidth * gapRatio;
  const scaleFactor = wkWidth / BASE_WK_W;
  let useWK_W = wkWidth;
  let useWK_GAP = wkGap;
  let useWK_H = BASE_WK_H * scaleFactor;
  let useBK_W = useWK_W * BASE_BK_RATIO_W;
  let useBK_H = useWK_H * BASE_BK_RATIO_H;

  if (useWK_H > 240) {
    const heightScale = 240 / useWK_H;
    useWK_W *= heightScale;
    useWK_GAP *= heightScale;
    useWK_H = 240;
    useBK_W *= heightScale;
    useBK_H = 240 * BASE_BK_RATIO_H;
  }

  const whiteX = {};
  let x = 0;
  for (let midi = range.startMidi; midi <= range.endMidi; midi++) {
    if (!isBlack(midi)) {
      whiteX[midi] = x;
      x += useWK_W + useWK_GAP;
    }
  }
  const totalW = x - useWK_GAP;

  stage.style.width = totalW + 'px';
  stage.style.height = useWK_H + 'px';

  for (let midi = range.startMidi; midi <= range.endMidi; midi++) {
    if (isBlack(midi)) continue;

    const whiteKey = document.createElement('div');
    whiteKey.className = 'wk';
    whiteKey.style.left = whiteX[midi] + 'px';
    whiteKey.style.width = useWK_W + 'px';
    whiteKey.style.height = useWK_H + 'px';

    const data = midiToNote(midi);
    if (data.note === 'C' && data.octave === 4) {
      const marker = document.createElement('div');
      marker.className = 'middle-c-marker';
      marker.innerHTML = '<div class="middle-c-star">&#11088;</div><div class="middle-c-text">Middle Do</div><div class="middle-c-octave">C4</div>';
      whiteKey.appendChild(marker);
    }

    stage.appendChild(whiteKey);
    allKeyEls[midi] = whiteKey;
  }

  for (let midi = range.startMidi; midi <= range.endMidi; midi++) {
    if (!isBlack(midi)) continue;

    const leftW = whiteX[midi - 1];
    const rightW = whiteX[midi + 1];
    let bx;
    if (leftW !== undefined && rightW !== undefined) {
      bx = leftW + useWK_W + useWK_GAP / 2 - useBK_W / 2;
    } else if (leftW !== undefined) {
      bx = leftW + useWK_W - useBK_W / 2;
    } else if (rightW !== undefined) {
      bx = rightW - useBK_W / 2;
    } else {
      continue;
    }

    const blackKey = document.createElement('div');
    const note = midiToNote(midi).note;
    const groupClass = (level === 'l1' || level === 'l2') ? getBlackGroup(note) : '';
    blackKey.className = ('bk ' + groupClass).trim();
    blackKey.style.left = Math.max(0, bx) + 'px';
    blackKey.style.width = useBK_W + 'px';
    blackKey.style.height = useBK_H + 'px';
    stage.appendChild(blackKey);
    allKeyEls[midi] = blackKey;
  }

  viewport.style.height = (useWK_H + 62) + 'px';
}

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach((button) => {
    button.classList.toggle('active', button.dataset.level === level);
  });
  buildPiano(level);
  if (lastMidi !== null) {
    const data = midiToNote(lastMidi);
    showNote(data.note, data.octave, lastMidi);
  }
}

function buildStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 55; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%;animation-delay:' + (Math.random() * 2) + 's;animation-duration:' + (1.5 + Math.random() * 2) + 's';
    container.appendChild(star);
  }
}

async function toggleListening() {
  if (listening) {
    stopListening();
  } else {
    await startListening();
  }
}

async function startListening() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 8192;
    source.connect(analyser);

    listening = true;
    silenceFrames = 0;
    lastMidi = null;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').innerHTML = '&#128308;';
    setStatus('&#128066;', 'Aku mendengarkan. Mainkan satu tuts piano.');
    pitchTimer = setInterval(detectPitch, 80);
  } catch (error) {
    setStatus('&#9888;&#65039;', 'Izinkan akses mikrofon terlebih dulu.');
  }
}

function stopListening() {
  listening = false;
  clearInterval(pitchTimer);
  if (mediaStream) mediaStream.getTracks().forEach((track) => track.stop());
  if (audioCtx) audioCtx.close();
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').innerHTML = '&#127908;';
  setStatus('&#128075;', 'Tekan tombol mikrofon lagi untuk mendengarkan.');
}

function detectPitch() {
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  let sumSq = 0;
  for (let i = 0; i < buf.length; i++) sumSq += buf[i] * buf[i];
  const rms = Math.sqrt(sumSq / buf.length);

  if (rms < RMS_THRESHOLD) {
    if (++silenceFrames > SILENCE_FRAMES && lastMidi !== null) {
      clearActive();
      hideIndicators();
      lastMidi = null;
    }
    return;
  }
  silenceFrames = 0;

  const freq = detectFrequency(buf, audioCtx.sampleRate);
  if (freq < 27 || freq > 4200) return;

  const midi = freqToMidi(freq);
  if (midi < 21 || midi > 108) return;
  if (midi === lastMidi) return;

  lastMidi = midi;
  const data = midiToNote(midi);
  showNote(data.note, data.octave, midi);
}

function detectFrequency(buf, sampleRate) {
  const size = buf.length;
  const maxLag = Math.floor(sampleRate / 27.5);
  const minLag = Math.floor(sampleRate / 4200);
  const nsdf = new Float32Array(maxLag + 1);

  let acf0 = 0;
  for (let i = 0; i < size; i++) acf0 += buf[i] * buf[i];
  if (acf0 < 1e-6) return -1;

  for (let lag = minLag; lag <= maxLag; lag++) {
    let sdf = 0;
    let norm = 0;
    const len = size - lag;
    for (let i = 0; i < len; i++) {
      const diff = buf[i] - buf[i + lag];
      sdf += diff * diff;
      norm += buf[i] * buf[i] + buf[i + lag] * buf[i + lag];
    }
    nsdf[lag] = norm < 1e-9 ? 0 : 1 - sdf / norm;
  }

  const threshold = 0.82;
  let peakLag = -1;
  let peakVal = threshold;
  let prevVal = nsdf[minLag];

  for (let lag = minLag + 1; lag <= maxLag; lag++) {
    const value = nsdf[lag];
    if (value >= threshold && value >= prevVal) {
      if (lag + 1 > maxLag || nsdf[lag + 1] <= value) {
        if (value > peakVal) {
          peakVal = value;
          peakLag = lag;
          break;
        }
      }
    }
    prevVal = value;
  }

  if (peakLag < 1) return -1;

  const y0 = nsdf[peakLag - 1] ?? nsdf[peakLag];
  const y1 = nsdf[peakLag];
  const y2 = peakLag + 1 <= maxLag ? nsdf[peakLag + 1] : y1;
  const denom = 2 * y1 - y0 - y2;
  const lag = denom === 0 ? peakLag : peakLag + 0.5 * (y0 - y2) / denom;
  return sampleRate / lag;
}

function clearActive() {
  document.querySelectorAll('.wk.active').forEach((key) => {
    key.classList.remove('active');
    key.style.background = '';
    key.style.borderColor = '';
    key.style.boxShadow = '';
  });

  document.querySelectorAll('.bk.active').forEach((key) => {
    key.classList.remove('active');
    key.style.background = '';
    key.style.boxShadow = '';
  });
}

function highlightKey(midi) {
  clearActive();
  hideIndicators();

  const range = LEVELS[currentLevel];
  if (midi < range.startMidi) {
    showIndicator('left');
    return false;
  }
  if (midi > range.endMidi) {
    showIndicator('right');
    return false;
  }

  const key = allKeyEls[midi];
  if (!key) return false;

  const data = midiToNote(midi);
  const color = NOTE_COLORS[data.note] || '#ffffff';
  key.classList.add('active');

  if (isBlack(midi)) {
    key.style.background = 'linear-gradient(180deg,' + color + ' 0%,' + color + '99 100%)';
    key.style.boxShadow = '0 0 12px ' + color + ', inset 0 0 7px rgba(255,255,255,0.2)';
  } else {
    key.style.background = 'linear-gradient(180deg,' + color + 'ff 0%,' + color + 'bb 100%)';
    key.style.borderColor = color;
    key.style.boxShadow = '0 0 18px ' + color + ', inset 0 0 12px rgba(255,255,255,0.45)';
  }

  return true;
}

function showNote(note, octave, midi) {
  const color = NOTE_COLORS[note] || '#ffffff';
  const display = getDisplayName(note);

  highlightKey(midi);

  const nameEl = document.getElementById('noteName');
  const extraEl = document.getElementById('noteExtra');
  const subEl = document.getElementById('noteSub');

  nameEl.classList.remove('show');
  extraEl.classList.remove('show');
  subEl.classList.remove('show');
  nameEl.style.color = color;
  nameEl.style.textShadow = '0 0 24px ' + color + ', 0 0 48px ' + color + '55';
  extraEl.style.color = color;

  window.setTimeout(() => {
    nameEl.textContent = display.main;
    extraEl.textContent = display.letter;
    subEl.textContent = 'Oktaf ' + octave;
    nameEl.classList.add('show');
    extraEl.classList.add('show');
    subEl.classList.add('show');
  }, 40);

  const baseName = display.main.split(' ')[0];
  const messages = [
    'Itu nada ' + baseName + '. Bagus sekali.',
    baseName + '. Kamu hebat.',
    'Nada ' + baseName + '. Teruskan.',
    baseName + '. Pintar sekali.'
  ];
  setStatus('&#127925;', messages[Math.floor(Math.random() * messages.length)]);
  launchConfetti(color);
}

function setStatus(iconHtml, text) {
  document.getElementById('statusBubble').innerHTML = '<span class="emoji">' + iconHtml + '</span><span>' + text + '</span>';
}

function launchConfetti(color) {
  const wrap = document.getElementById('confetti');
  const palette = [color, '#FECA57', '#48DBFB', '#FF9FF3', '#FFFFFF'];
  for (let i = 0; i < 20; i++) {
    const piece = document.createElement('div');
    piece.className = 'cp';
    const confettiColor = palette[Math.floor(Math.random() * palette.length)];
    const size = 6 + Math.random() * 7;
    piece.style.cssText = 'left:' + (15 + Math.random() * 70) + '%;top:-10px;background:' + confettiColor + ';width:' + size + 'px;height:' + size + 'px;border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';animation:fall ' + (0.9 + Math.random() * 1.2) + 's ' + (Math.random() * 0.3) + 's linear forwards;';
    wrap.appendChild(piece);
    window.setTimeout(() => piece.remove(), 2200);
  }
}

buildStars();
window.requestAnimationFrame(() => {
  window.requestAnimationFrame(() => {
    buildPiano(currentLevel);
  });
});

window.addEventListener('resize', () => {
  window.clearTimeout(resizeTimer);
  resizeTimer = window.setTimeout(() => {
    buildPiano(currentLevel);
    if (lastMidi !== null) {
      const data = midiToNote(lastMidi);
      showNote(data.note, data.octave, lastMidi);
    }
  }, 60);
});

window.addEventListener('beforeunload', () => {
  if (listening) stopListening();
});
</script>
</body>
</html>
